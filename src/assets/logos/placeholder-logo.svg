<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop
        offset="0%"
        style="stop-color: rgba(45, 212, 191, 0.14); stop-opacity: 1"
      />
      <stop
        offset="100%"
        style="stop-color: rgba(244, 184, 96, 0.14); stop-opacity: 1"
      />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop
        offset="0%"
        style="stop-color: rgba(45, 212, 191, 0.9); stop-opacity: 1"
      />
      <stop
        offset="100%"
        style="stop-color: rgba(244, 184, 96, 0.9); stop-opacity: 1"
      />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bgGradient)" />

  <!-- Border -->
  <rect
    x="10"
    y="10"
    width="180"
    height="180"
    rx="8"
    stroke="rgba(45,212,191,0.35)"
    stroke-width="2"
    fill="none"
  />

  <!-- Building/Company Icon -->
  <rect x="70" y="60" width="20" height="40" rx="2" fill="url(#iconGradient)" />
  <rect x="95" y="50" width="20" height="50" rx="2" fill="url(#iconGradient)" />
  <rect
    x="120"
    y="70"
    width="20"
    height="30"
    rx="2"
    fill="url(#iconGradient)"
  />

  <!-- Windows -->
  <rect
    x="73"
    y="65"
    width="4"
    height="4"
    rx="1"
    fill="rgba(255,255,255,0.8)"
  />
  <rect
    x="80"
    y="65"
    width="4"
    height="4"
    rx="1"
    fill="rgba(255,255,255,0.8)"
  />
  <rect
    x="98"
    y="55"
    width="4"
    height="4"
    rx="1"
    fill="rgba(255,255,255,0.8)"
  />
  <rect
    x="105"
    y="55"
    width="4"
    height="4"
    rx="1"
    fill="rgba(255,255,255,0.8)"
  />

  <!-- Company Name -->
  <text
    x="100"
    y="130"
    text-anchor="middle"
    fill="rgba(45,212,191,0.82)"
    font-family="Arial, sans-serif"
    font-size="14"
    font-weight="600"
  >
    COMPANY
  </text>
  <text
    x="100"
    y="150"
    text-anchor="middle"
    fill="rgba(244,184,96,0.82)"
    font-family="Arial, sans-serif"
    font-size="12"
  >
    LOGO
  </text>

  <!-- Decorative elements -->
  <rect
    x="47"
    y="47"
    width="6"
    height="6"
    rx="2"
    fill="rgba(45,212,191,0.35)"
  />
  <rect
    x="147"
    y="47"
    width="6"
    height="6"
    rx="2"
    fill="rgba(244,184,96,0.35)"
  />
  <rect
    x="47"
    y="147"
    width="6"
    height="6"
    rx="2"
    fill="rgba(244,184,96,0.35)"
  />
  <rect
    x="147"
    y="147"
    width="6"
    height="6"
    rx="2"
    fill="rgba(45,212,191,0.35)"
  />
</svg>
